# Configuração comum. Cada nó ajusta node-id e porta HTTP via profile (n1/n2/n3).
spring.application.name=instituicao

# Nó padrão quando nenhum profile é ativado (equivale a rodar como n1).
instituicao.node-id=n1
server.port=8081

# Raft ligado por padrão: escritas passam pelo consenso (precisa de maioria de nós).
# Para desenvolver/testar o endpoint num único processo, use: --instituicao.raft.enabled=false
instituicao.raft.enabled=true
